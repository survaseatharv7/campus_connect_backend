# ==========================
# Application
# ==========================
spring.application.name=campus-nexus

# ==========================
# PostgreSQL
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================
# JWT
# ==========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# ==========================
# Firebase
# ==========================
firebase.service-account-path=classpath:firebase-service-account.json
firebase.storage-bucket=petzstore-c4f70.firebasestorage.app

# ==========================
# Stripe
# ==========================
stripe.api-key=${STRIPE_API_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# ==========================
# Mail
# ==========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# Multipart
# ==========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ==========================
# Cloudinary
# ==========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================
# Swagger
# ==========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================
# Server
# ==========================
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ==========================
# CORS
# ==========================
spring.web.cors.allowed-origins=*

# ==========================
# Ngrok (Only for Local Development)
# ==========================
app.ngrok-url=${NGROK_URL:}

# ==========================
# Groq AI
# ==========================
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile